{% extends "base.html" %}
{% block content %}
<div class="row g-4 justify-content-center align-items-center">
  <div class="col-lg-5 d-none d-lg-block">
    <section class="hero-panel p-4">
      <img src="{{ url_for('static', filename='hero.svg') }}" alt="YeaBook Illustration" class="hero-img mb-3" />
      <h2 class="h4">YeaBook</h2>
      <p class="mb-0 text-body-secondary">{{ tr('hero_login_subtitle') }}</p>
    </section>
  </div>
  <div class="col-md-7 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h5 mb-3">{{ tr('sign_in') }}</h1>
        <form method="post" action="{{ url_for('web.login') }}" class="row g-3">
          <div class="col-12">
            <label class="form-label" for="username">{{ tr('username') }}</label>
            <input class="form-control" id="username" name="username" required>
          </div>
          <div class="col-12">
            <label class="form-label" for="password">{{ tr('password') }}</label>
            <input class="form-control" type="password" id="password" name="password" required>
          </div>
          <div class="col-12">
            <button class="btn btn-primary w-100" type="submit">{{ tr('login') }}</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
