{% extends "base.html" %}
{% block content %}
<div class="row g-4">
  <div class="col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="card-title">{{ tr('create_phonebook') }}</h5>
        <form method="post" action="{{ url_for('web.create_phonebook') }}" class="row g-3">
          <div class="col-12">
            <label for="name" class="form-label">{{ tr('name') }}</label>
            <input type="text" class="form-control" id="name" name="name" required />
          </div>
          <div class="col-12">
            <label for="description" class="form-label">{{ tr('description') }}</label>
            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
          </div>
          <div class="col-12">
            <button class="btn btn-primary" type="submit">{{ tr('create') }}</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="col-lg-7">
    <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="card-title">{{ tr('available_phonebooks') }}</h5>
        {% if books %}
          <div class="list-group list-group-flush">
            {% for book in books %}
              <a href="{{ url_for('web.view_phonebook', phonebook_id=book.id) }}" class="list-group-item list-group-item-action py-3">
                <strong>{{ book.name }}</strong>
                <small class="d-block text-muted">Slug: {{ book.slug }}</small>
              </a>
            {% endfor %}
          </div>
        {% else %}
          <p class="mb-0 text-muted">{{ tr('no_phonebooks') }}</p>
        {% endif %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
